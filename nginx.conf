# =========================================================================
# Configuration Nginx Sécurisée et Optimisée pour SVG Shape Creator
# =========================================================================
# Ce fichier contient les meilleures pratiques en matière de sécurité (HSTS, CSP,
# protection contre le détournement de clic, etc.) et de performance en utilisant
# la compression Brotli (avec un repli Gzip pour la compatibilité descendante).
# Elle est conçue pour respecter les performances d'un serveur léger ("Amstrad-ready")
# tout en garantissant une étanchéité RGAA et de sécurité maximale.

# Configuration générale pour limiter l'empreinte mémoire et la divulgation d'informations
server_tokens off; # Désactive la signature de version Nginx en en-tête

server {
    listen 80;
    listen [::]:80;
    server_name votre-domaine.com; # À remplacer par votre vrai domaine ou sous-domaine

    # Emplacement du challenge ACME de Certbot / Let's Encrypt (évite d'échouer si HTTPS n'est pas encore actif)
    location /.well-known/acme-challenge/ {
        root /var/www/svg-shape-creator/dist;
        allow all;
    }

    # Redirection automatique et permanente de tout le trafic HTTP non sécurisé vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name votre-domaine.com; # À remplacer par votre vrai domaine ou sous-domaine

    # Racine du projet pointant vers le répertoire contenant la compilation statique (Vite dist)
    root /var/www/svg-shape-creator/dist;
    index index.html;

    # -------------------------------------------------------------------------
    # Certificats SSL/TLS (Configurés pour Let's Encrypt / Certbot)
    # -------------------------------------------------------------------------
    # Remplacer les chemins par ceux de votre certificat multisite Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/votre-domaine.com/chain.pem;

    # Paramètres SSL Modernes et Durcis (Recommandations Mozilla SSL Configurator)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Session SSL légère pour soulager le processeur et la RAM du serveur ("Amstrad-style")
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m; # Environ 40 000 sessions en mémoire partagée
    ssl_session_tickets off;

    # Agrafage OCSP (OCSP Stapling) - Soulage le client en transmettant la validité du certificat
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # En-têtes de Sécurité HTTP (Strict Standard)
    # -------------------------------------------------------------------------
    # HSTS - Force l'utilisation du HTTPS pour le domaine et les sous-domaines (6 mois minimum recommandés, 2 ans ici)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Empêche l'affichage du site dans une iframe externe (Protection contre le clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Désactive la détection automatique du type de contenu par le navigateur (Sniffing)
    add_header X-Content-Type-Options "nosniff" always;

    # Politique de provenance sécurisée des requêtes (Referrer Policy)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (CSP) stricte adaptée à notre application vanilla sans dépendance externe :
    # - default-src 'self' : Tout doit provenir du même domaine d'origine.
    # - style-src 'self' 'unsafe-inline' : Nécessaire pour les injections dynamiques et les variables oklch contrôlées en JS.
    # - img-src 'self' data: : Autorise les assets internes et les SVG encodés en base64.
    # - frame-ancestors 'none' : Empêche toute intégration iframe externe (anti-détournement).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;

    # Permissions Policy (RGAA et Vie Privée) - Bloque tous les accès non nécessaires aux capteurs matériels
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;

    # -------------------------------------------------------------------------
    # Gestion des Limites & Buffers (Protection contre les dénis de service et OOM)
    # -------------------------------------------------------------------------
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 2m; # Notre app n'a aucun endpoint d'upload de fichier
    large_client_header_buffers 2 1k;

    # -------------------------------------------------------------------------
    # Compression Avancée (Brotli en priorité, Gzip en repli)
    # -------------------------------------------------------------------------
    # Compression Brotli (Nécessite le module ngx_brotli sur le serveur)
    brotli on;
    brotli_static on; # Utilise les fichiers .br pré-compressés s'ils existent
    brotli_comp_level 6; # Niveau optimal entre qualité de compression et calcul CPU
    brotli_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        image/x-icon;

    # Compression Gzip (Pour les anciens navigateurs ou serveurs sans Brotli)
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        image/x-icon;

    # -------------------------------------------------------------------------
    # Routage du Trafic et Cache Statique (Amstrad-ready !)
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Configuration fine du cache pour les assets avec hash construits par Vite (immutables)
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        log_not_found off;
    }

    # Le fichier index.html ne doit JAMAIS être mis en cache pour permettre des rechargements immédiats lors des MàJ
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Sécuriser l'accès aux fichiers sensibles potentiels dans le build ou le répertoire racine (ex: .git, .env)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
