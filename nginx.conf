# =========================================================================
# Secured and Optimized Nginx Configuration for SVG Shape Creator
# =========================================================================
# This file contains security best practices (HSTS, CSP, clickjacking 
# protection, etc.) and performance optimizations using Brotli compression
# (with Gzip fallback for backward compatibility). It is designed to fit 
# the performance of a lightweight VPS ("Amstrad-ready") while ensuring 
# RGAA compliance and maximum runtime security.

# General configuration to limit memory footprint and information disclosure
server_tokens off; # Disables Nginx version signature in headers

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name shape.lionel-peramo.com; # Configured domain for your application

    # ACME challenge location for Certbot / Let's Encrypt (prevents failures if HTTPS is not yet active)
    location /.well-known/acme-challenge/ {
        root /var/www/html/svg-shape-creator/dist;
        allow all;
    }

    # Automatic and permanent redirection from HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name shape.lionel-peramo.com; # Main application domain

    # Project root pointing to static compilation directory (Vite 'dist')
    root /var/www/html/svg-shape-creator/dist;
    index index.html;

    # -------------------------------------------------------------------------
    # SSL/TLS Certificates (Configured for Let's Encrypt / Certbot)
    # -------------------------------------------------------------------------
    # Let's Encrypt certificate file paths for shape.lionel-peramo.com
    ssl_certificate /etc/letsencrypt/live/shape.lionel-peramo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shape.lionel-peramo.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/shape.lionel-peramo.com/chain.pem;

    # Modern and Hardened SSL Parameters (Mozilla SSL Configurator recommendations)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Lightweight SSL session to ease CPU and RAM load ("Amstrad-style")
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m; # Around 40,000 sessions in shared memory
    ssl_session_tickets off;

    # OCSP Stapling - Offloads client validation efforts by presenting verification statuses
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # HTTP Security Headers (Strict Standard)
    # -------------------------------------------------------------------------
    # HSTS - Forces HTTPS usage for domain and subdomains (6 months minimum recommended, 2 years here)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevents clickjacking by blocking rendering of pages inside frames on external websites
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Avoid Content Sniffing vulnerabilities by disabling automatic content-type guessing
    add_header X-Content-Type-Options "nosniff" always;

    # Secure Referrer Policy (hides origin URL upon transition to other HTTPS hosts)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (CSP) tailored for vanilla app without external CDN scripts:
    # - default-src 'self' : Everything serves from application origin host.
    # - style-src 'self' 'unsafe-inline' : Required for dynamic inline styles and OKLCH properties.
    # - img-src 'self' data: : Allows locally bundled illustrations and base-64 encoded inline assets.
    # - frame-ancestors 'none' : Blocks external iframe injection.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;

    # Permissions Policy (RGAA & privacy compliance) - Disable unneeded hardware sensors
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;

    # -------------------------------------------------------------------------
    # Resource Limits & Buffers (Avoids simple vulnerabilities and memory leak OOMs)
    # -------------------------------------------------------------------------
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 2m; # No backend files upload destinations available
    large_client_header_buffers 2 1k;

    # -------------------------------------------------------------------------
    # Smart Content Compression (Brotli priority, Gzip fallback)
    # -------------------------------------------------------------------------
    # Brotli Compression (demands ngx_brotli module compiled with host Nginx)
    brotli on;
    brotli_static on; # Serve pre-compressed .br compiled assets directly
    brotli_comp_level 6; # Optimal CPU load vs payload compression factor
    brotli_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        image/x-icon;

    # Gzip Compression (fallback for legacy user-agents or host lacking brotli module)
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        image/x-icon;

    # -------------------------------------------------------------------------
    # Native SPA Routing and Cache Lifespans (Amstrad-ready performance optimizations)
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable build directories caching policy for Vite hashed files
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        log_not_found off;
    }

    # Prevent index.html layout caching for seamless live updates on release
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Block sensitive system files retrieval (.git, .env config etc.)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
